<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sensitivity Analysis Applications</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,600&Lato|Work+Sans:400,700&display=swap" rel="stylesheet" type='text/css'>
  <style>*:not(:defined){visibility:hidden}</style>
  <link rel="icon" type="image/x-icon" href="_static/favicon.png">
  <meta name="theme-color" content="#ffffff">
  <script type="module" src="https://unpkg.com/@microsoft/fast-components@2.30.6/dist/fast-components.js"></script>
  <script type="text/javascript">
    function setParamsFromSearch(text){
        const params = new URLSearchParams(location.search);
        if (text===""){
            params.delete("search")
        } else {
            params.set('search', text);
        }
        window.history.replaceState({}, '', `${location.pathname}?${params}`);
    }
    function hideCards(text) {
      text=text.toLowerCase();
      const cards = document.getElementsByTagName("li")
      for (const card of cards){
          if (text==="" || card.innerHTML.toLowerCase().includes(text)){
              card.style.display=""
          } else {card.style.display="none"}
      }
      setParamsFromSearch(text)
    }
    function applyTheme(isDark) {
        const bodyProvider = document.getElementById("body-design-provider");
        const headerProvider = document.getElementById("header-design-provider");
        if (isDark) {
            bodyProvider.setAttribute("background-color", "#000000");
            bodyProvider.setAttribute("base-layer-luminance", "0.1");
            headerProvider.setAttribute("background-color", "#1a1a1a");
        } else {
            bodyProvider.setAttribute("background-color", "#ffffff");
            bodyProvider.setAttribute("base-layer-luminance", "1");
            headerProvider.setAttribute("background-color", "#ffffff");
        }
    }
    function toggleLightDarkTheme(update) {
        const switchEl = document.getElementById("theme-switch");
        const params = new URLSearchParams(location.search);
        const isDark = !switchEl.checked;
        applyTheme(isDark);
        params.set('theme', isDark ? "dark" : "default");
        if (update) {
            window.history.replaceState({}, '', `${location.pathname}?${params}`);
        }
    }
    function setSwitchFromParams(){
        const params = new URLSearchParams(window.location.search)
        const switchEl = document.getElementById("theme-switch")
        if (params.has('theme')){
            const theme = params.get('theme')
            if (theme==='dark'){
                switchEl.checked = false
            } else {
                switchEl.checked = true
            }
        }
        applyTheme(switchEl.checked === false)
    }
    function setSearchFromParams(){
        const params = new URLSearchParams(window.location.search)
        if (params.has('search')){
            const search = params.get('search')
            const searchEl = document.getElementById("search-input")
            searchEl.value = search
            hideCards(search)
        }
    }
  </script>
  <style>
    :root {
      --background-color: #ffffff;
      --header-background: #ffffff;
    }
    html {
        height:100%;
    }
    html, #body-design-provider {
        min-height: 100vh;
    }
    body {
        margin: 0px;
        padding: 0;
        font-style: normal;
        font-weight: normal;
        font-size: 16px;
        font-family: aktiv-grotesk, "Segoe UI", Arial, Helvetica, sans-serif;
        overflow-y: auto;
    }
    .gallery-item:hover {
        box-shadow: 0 1px 5px var(--neutral-fill-strong-focus);
    }
    .gallery-item {
        cursor: pointer;
        text-align: center;
    }
    .header {
        background-size: cover;
        background-repeat: space;
        background-position: center;
        border-bottom: 1px solid #e0e0e0;
        transition: background-color 0.3s;
    }
    .header-content {
        display: flex;
        flex-direction: column;
        padding: 2rem;
    }
    #body-design-provider {
        color: var(--neutral-foreground-rest);
    }
    #title {
        background: transparent;
    }
    #search-input {
        margin-top: 1em;
        margin-left:2em;
        margin-bottom:0em;
        width: calc(100% - 4em);
    }
    .theme-toggle-icon {
        height: 25px;
        width: 25px;
        margin-top: 5px;
        fill: #bababa;
    }
    .cards-grid {
        --cards-grid-min-size: 16rem;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(var(--cards-grid-min-size), 1fr));
        grid-gap: 2rem;
        list-style: none;
        margin: 2rem;
        padding: 0px;
    }
    .card {
        padding: 0px;
    }
    .card-image {
        height: 175px;
        width: 100%;
        margin-top: 25px;
    }
    object {
        height: 175px;
        max-width: calc(100% - 50px);
        margin-top: 25px;
        border-radius: calc(var(--control-corner-radius) * 1px);
    }
    .card-content {
        padding: 10px 10px 10px;
        color: var(--neutral-foreground-rest);
    }
    .card-header {
        height: 2em;
        text-align: center;
    }
    .card-link {
        text-decoration: none;
        color: var(--neutral-foreground-rest);
    }
    footer {
        padding: .50rem;
        text-align: center;
        font-size: .75rem;
    }
  </style>
</head>
<body>
  <fast-design-system-provider id="body-design-provider" use-defaults background-color="#ffffff" base-layer-luminance="1" accent-base-color="#0072B5">

    <fast-design-system-provider id="header-design-provider" use-defaults background-color="#ffffff">
      <section class="header">
        <fast-switch id="theme-switch" style="float: right; padding-top: 1em; padding-right: 2em;" onChange="toggleLightDarkTheme(true)" checked>
          <span slot="checked-message">
            <svg class="theme-toggle-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25"><path d="M0 0h24v24H0z" fill="none"/><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/></svg>
          </span>
          <span slot="unchecked-message">
            <svg class="theme-toggle-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25"><path d="M0 0h24v24H0z" fill="none"/><path d="M10 2c-1.82 0-3.53.5-5 1.35C7.99 5.08 10 8.3 10 12s-2.01 6.92-5 8.65C6.47 21.5 8.18 22 10 22c5.52 0 10-4.48 10-10S15.52 2 10 2z"/></svg>
          </span>
        </fast-switch>
        <fast-tooltip anchor="theme-switch">Click to toggle the Theme</fast-tooltip>
        <div class="header-content">
          <div>
            <fast-anchor id="title" href="https://simdec.fi" appearance="neutral" target="_self">
              <img id="logo" src="_static/logo.gif" width="150" height="150">
            </fast-anchor>
            <fast-tooltip anchor="title">Click to visit the SimDec web site</fast-tooltip>
          </div>
        </div>
      </section>
    </fast-design-system-provider>

    <section class="search">
      <fast-text-field id="search-input" placeholder="search" onInput="hideCards(event.target.value)"></fast-text-field>
    </section>

    <section id="cards">
      <ul class="cards-grid">
        <li class="card">
          <a class="card-link" href="./simdec_app.html" id="simdec_app">
            <fast-card class="gallery-item">
              <object data="_static/thumbnails/simdec_app.png" type="image/png">
                <svg class="card-image" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M2.5 4a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1zm2-.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0zm1 .5a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1z"/>
                  <path d="M2 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2H2zm13 2v2H1V3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1zM2 14a1 1 0 0 1-1-1V6h14v7a1 1 0 0 1-1 1H2z"/>
                </svg>
              </object>
              <div class="card-content">
                <h2 class="card-header">SimDec App</h2>
              </div>
            </fast-card>
          </a>
        </li>
        <li class="card">
          <a class="card-link" href="./sampling.html" id="sampling">
            <fast-card class="gallery-item">
              <object data="_static/thumbnails/sampling.png" type="image/png">
                <svg class="card-image" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M2.5 4a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1zm2-.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0zm1 .5a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1z"/>
                  <path d="M2 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2H2zm13 2v2H1V3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1zM2 14a1 1 0 0 1-1-1V6h14v7a1 1 0 0 1-1 1H2z"/>
                </svg>
              </object>
              <div class="card-content">
                <h2 class="card-header">Sampling</h2>
              </div>
            </fast-card>
          </a>
        </li>
      </ul>
    </section>
    <section>
      <fast-divider></fast-divider>
      <footer></footer>
    </section>
  </fast-design-system-provider>
  <script type="text/javascript">
    document.addEventListener('DOMContentLoaded', () => {
      setSwitchFromParams();
      setSearchFromParams();
    });
  </script>
</body>
</html>
